name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint & type check
        run: |
          npm run lint
          npm run typecheck
      - name: Run unit + integration tests
        run: npm run test
      - name: Build frontend
        run: npm run build
      # Optionally run e2e tests here pointing at a deployed preview
