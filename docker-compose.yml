version: '3.8'
services:
  app:
    build: .
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=file:./dev.db
    volumes:
      - .:/app
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: educore
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: {}
